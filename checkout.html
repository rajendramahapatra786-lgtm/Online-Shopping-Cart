<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - AnimeShop</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS Files -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components/navbar.css">
    <link rel="stylesheet" href="css/components/footer.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        .checkout-container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            border-radius: var(--radius-lg);
            padding: 30px;
            box-shadow: var(--shadow-lg);
        }
        
        .checkout-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .checkout-header i {
            font-size: 3rem;
            color: var(--success);
            margin-bottom: 15px;
        }
        
        .checkout-header h2 {
            color: var(--success);
            margin-bottom: 10px;
        }
        
        .order-details {
            margin: 30px 0;
            padding: 20px;
            background: var(--light);
            border-radius: var(--radius-md);
        }
        
        .order-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--gray);
        }
        
        .order-row:last-child {
            border-bottom: none;
        }
        
        .order-row.total {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--primary);
            margin-top: 10px;
            padding-top: 10px;
            border-top: 2px solid var(--primary);
        }
        
        .delivery-info {
            margin: 20px 0;
            padding: 15px;
            background: #e8f5e9;
            border-radius: var(--radius-md);
            color: var(--success);
        }
        
        .home-btn {
            display: inline-block;
            padding: 12px 30px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: var(--radius-sm);
            margin-top: 20px;
            transition: background 0.3s ease;
        }
        
        .home-btn:hover {
            background: var(--primary-dark);
        }
    </style>
</head>
<body>
    <!-- Navbar placeholder -->
    <div id="navbar"></div>

    <main class="container">
        <div class="checkout-container">
            <div class="checkout-header">
                <i class="fas fa-check-circle"></i>
                <h2>Order Placed Successfully!</h2>
                <p>Thank you for shopping with AnimeShop</p>
            </div>
            
            <div class="delivery-info">
                <i class="fas fa-truck"></i> 
                Estimated Delivery: 3-5 business days
            </div>
            
            <div class="order-details" id="orderDetails">
                <!-- Order details loaded via JavaScript -->
            </div>
            
            <div style="text-align: center;">
                <a href="index.html" class="home-btn">
                    <i class="fas fa-home"></i> Continue Shopping
                </a>
            </div>
        </div>
    </main>

    <!-- Footer placeholder -->
    <div id="footer"></div>

    <!-- JavaScript Files -->
    <script src="js/services/storage.js"></script>
    <script src="js/services/cart.js"></script>
    <script src="js/utils/helpers.js"></script>
    <script src="js/load-components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const cart = CartService.getCart();
            const orderDetails = document.getElementById('orderDetails');
            
            if (cart.length === 0) {
                window.location.href = 'index.html';
                return;
            }
            
            let subtotal = 0;
            let itemsHtml = '';
            
            cart.forEach(item => {
                subtotal += item.price * item.quantity;
                itemsHtml += `
                    <div class="order-row">
                        <span>${item.name} (x${item.quantity})</span>
                        <span>${Helpers.formatPrice(item.price * item.quantity)}</span>
                    </div>
                `;
            });
            
            const tax = subtotal * 0.18;
            const total = subtotal + tax;
            
            orderDetails.innerHTML = `
                ${itemsHtml}
                <div class="order-row">
                    <span>Subtotal</span>
                    <span>${Helpers.formatPrice(subtotal)}</span>
                </div>
                <div class="order-row">
                    <span>Tax (18% GST)</span>
                    <span>${Helpers.formatPrice(tax)}</span>
                </div>
                <div class="order-row total">
                    <span>Total Paid</span>
                    <span>${Helpers.formatPrice(total)}</span>
                </div>
            `;
            
            // Clear cart after successful order
            CartService.clearCart();
        });
    </script>
</body>
</html>
