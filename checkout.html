<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - AnimeStreet</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navbar -->
    <div class="nav-bar">
        <div class="nav-container">
            <a href="index.html" class="logo">AnimeStreet</a>
            <div class="search-box">
                <input type="text" id="search" placeholder="Search...">
                <button>🔍</button>
            </div>
            <div class="nav-icons">
                <a href="wishlist.html">❤️ <span class="wish-count">0</span></a>
                <a href="cart.html">🛒 <span class="cart-count">0</span></a>
                <a href="#" id="userIcon">👤</a>
            </div>
        </div>
        <div class="nav-menu">
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="anime-tees.html">Tees</a>
            <a href="hoodies.html">Hoodies</a>
        </div>
    </div>

    <!-- Page Header -->
    <div class="page-header">
        <h1>Checkout</h1>
    </div>

    <!-- Checkout Form -->
    <div class="section">
        <div class="checkout-container">
            <div class="checkout-form">
                <h3>Shipping Address</h3>
                <input type="text" placeholder="Full Name" value="Test User">
                <input type="text" placeholder="Address" value="123 Anime Street">
                <input type="text" placeholder="City" value="Mumbai">
                <input type="text" placeholder="Pincode" value="400001">
                <input type="text" placeholder="Phone" value="9876543210">
                
                <h3>Payment Method</h3>
                <div class="payment-options">
                    <label><input type="radio" name="payment" checked> Cash on Delivery</label>
                    <label><input type="radio" name="payment"> UPI</label>
                    <label><input type="radio" name="payment"> Card</label>
                </div>
                
                <button class="btn place-order" id="placeOrder">Place Order (Demo)</button>
            </div>
            <div class="order-summary" id="orderSummary">
                <h3>Your Order</h3>
                <div id="orderItems"></div>
                <div class="summary-row total">
                    <span>Total:</span>
                    <span id="orderTotal">₹0</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <div class="footer-content">
            <div class="footer-col">
                <h4>AnimeStreet</h4>
                <p>Your favorite anime merch store in India</p>
            </div>
            <div class="footer-col">
                <h4>Quick Links</h4>
                <a href="shop.html">Shop</a>
                <a href="cart.html">Cart</a>
                <a href="wishlist.html">Wishlist</a>
            </div>
            <div class="footer-col">
                <h4>Contact</h4>
                <p>Email: hello@animestreet.in</p>
                <p>📞 +91 98765 43210</p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>© 2024 AnimeStreet. All prices in ₹</p>
        </div>
    </div>

    <script src="js/data/products.js"></script>
    <script src="js/utils/storage.js"></script>
    <script src="js/utils/currency.js"></script>
    <script src="js/services/cart-service.js"></script>
    <script src="js/components/navbar.js"></script>
    <script src="js/pages/checkout.js"></script>
</body>
</html>
