<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wishlist - AnimeShop</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS Files -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components/navbar.css">
    <link rel="stylesheet" href="css/components/footer.css">
    <link rel="stylesheet" href="css/components/product-card.css">
    <link rel="stylesheet" href="css/components/filters.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!-- Wishlist specific styles -->
    <!-- <link rel="stylesheet" href="css/pages/wishlist.css"> -->
</head>
<body>
    <!-- Navbar placeholder -->
    <div id="navbar"></div>

    <main>
        <!-- Page Header -->
        <div class="page-header">
            <div class="container">
                <h1>My Wishlist</h1>
                <p>Your saved items (<span id="wishlistCount">0</span>)</p>
            </div>
        </div>

        <div class="container">
            <!-- Wishlist Items Container -->
            <div class="wishlist-container" id="wishlistItems">
                <!-- Wishlist items loaded via JavaScript -->
            </div>

            <!-- Empty Wishlist State -->
            <div id="emptyWishlist" class="empty-state" style="display: none;">
                <i class="fas fa-heart" style="font-size: 4rem; color: #ccc; margin-bottom: 20px;"></i>
                <h3>Your wishlist is empty</h3>
                <p>Save your favorite items and shop them later!</p>
                <a href="fashion.html" class="btn-reset" style="display: inline-block; margin-top: 15px; padding: 10px 30px;">Continue Shopping</a>
            </div>
        </div>
    </main>

    <!-- Footer placeholder -->
    <div id="footer"></div>

    <!-- JavaScript Files -->
    <script src="js/products.js"></script>
    <script src="js/services/storage.js"></script>
    <script src="js/services/cart.js"></script>
    <script src="js/services/wishlist.js"></script>
    <script src="js/utils/helpers.js"></script>
    <script src="js/utils/filters.js"></script>
    <script src="js/load-components.js"></script>
    <script src="js/pages/wishlist-page.js"></script>
</body>
</html>
