<!-- Product Card Template - Copy this HTML where you need a product card -->
<div class="product-card">
    <a href="product.html?id=1" class="card-link">
        <div class="card-image">
            <img src="assets/images/products/demon-slayer-1.jpg" alt="Demon Slayer T-Shirt">
            <span class="discount-badge">30% OFF</span>
        </div>
        <div class="card-content">
            <h3 class="product-title">Demon Slayer - Flame Hashira</h3>
            <p class="product-character">Rengoku</p>
            <div class="product-price">
                <span class="current-price">₹899</span>
                <span class="old-price">₹1299</span>
            </div>
        </div>
    </a>
    <div class="card-actions">
        <button class="add-to-cart" onclick="addToCart(1)">
            🛒 Add to Cart
        </button>
        <button class="add-to-wishlist" onclick="addToWishlist(1)">
            ❤️
        </button>
    </div>
</div>

<style>
.card-image {
    position: relative;
}

.discount-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: #ff6b4a;
    color: white;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 12px;
}

.product-character {
    color: #666;
    font-size: 14px;
    margin: 5px 0;
}

.card-actions {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.add-to-cart {
    flex: 1;
    background: #ff6b4a;
    color: white;
    border: none;
    padding: 8px;
    border-radius: 4px;
    cursor: pointer;
}

.add-to-wishlist {
    width: 40px;
    background: #f0f0f0;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
}

.add-to-cart:hover {
    background: #ff4a2a;
}

.add-to-wishlist:hover {
    background: #ffe0e0;
}
</style>
