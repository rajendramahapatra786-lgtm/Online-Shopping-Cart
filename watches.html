<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Watches - AnimeShop</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS Files -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components/navbar.css">
    <link rel="stylesheet" href="css/components/footer.css">
    <link rel="stylesheet" href="css/components/product-card.css">
    <link rel="stylesheet" href="css/components/filters.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <!-- Navbar placeholder -->
    <div id="navbar"></div>

    <main>
        <!-- Page Header -->
        <div class="page-header">
            <div class="container">
                <h1>Anime Watches</h1>
                <p>Premium anime-themed wrist watches</p>
            </div>
        </div>

        <div class="container">
            <!-- Filters Section -->
            <div class="filters-section">
                <div class="filter-group">
                    <label>Sort by:</label>
                    <select id="sortBy">
                        <option value="default">Default</option>
                        <option value="price-low">Price: Low to High</option>
                        <option value="price-high">Price: High to Low</option>
                        <option value="popular">Most Popular</option>
                        <option value="rating">Top Rated</option>
                    </select>
                </div>

                <button class="btn-reset" id="resetFilters">Reset Filters</button>
            </div>

            <!-- Products Grid -->
            <div class="products-grid" id="watchesGrid">
                <!-- Products loaded via JavaScript -->
            </div>
        </div>
    </main>

    <!-- Footer placeholder -->
    <div id="footer"></div>

    <!-- JavaScript Files -->
    <script src="js/products.js"></script>
    <script src="js/services/storage.js"></script>
    <script src="js/services/cart.js"></script>
    <script src="js/services/wishlist.js"></script>
    <script src="js/utils/helpers.js"></script>
    <script src="js/utils/filters.js"></script>
    <script src="js/load-components.js"></script>
    <script src="js/pages/main.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const watchesProducts = products.filter(p => p.category === 'watches');
        const grid = document.getElementById('watchesGrid');
        const sortSelect = document.getElementById('sortBy');
        const resetBtn = document.getElementById('resetFilters');
        
        let currentSort = 'default';
        
        function renderProducts() {
            let filtered = [...watchesProducts];
            
            if (currentSort !== 'default') {
                filtered = FilterUtils.sortProducts(filtered, currentSort);
            }
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="no-products">No products found</div>';
                return;
            }
            
            grid.innerHTML = filtered.map(product => {
                const isInWishlist = WishlistService.isInWishlist(product.id);
                
                return `
                    <div class="product-card" data-id="${product.id}">
                        <div class="product-image">
                            <img src="${product.image}" alt="${product.name}">
                            ${product.featured ? '<span class="product-badge">Featured</span>' : ''}
                            <!-- Heart icon in top-right corner -->
                            <button class="wishlist-btn ${isInWishlist ? 'active' : ''}" 
                                    onclick="toggleWishlist(${product.id})"
                                    data-product-id="${product.id}">
                                <i class="fas fa-heart"></i>
                            </button>
                        </div>
                        <div class="product-info">
                            <div class="product-type">WATCH</div>
                            <h3 class="product-name">${product.name}</h3>
                            <div class="product-rating">
                                <span class="stars">${Helpers.getStarRating(product.rating)}</span>
                                <span class="reviews">(${product.reviews})</span>
                            </div>
                            <div class="product-price">${Helpers.formatPrice(product.price)}</div>
                            <!-- Add to Cart at bottom -->
                            <button class="add-to-cart-btn" 
                                    onclick="CartService.addToCart(${JSON.stringify(product).replace(/"/g, '&quot;')})">
                                <i class="fas fa-shopping-cart"></i> Add to Cart
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        sortSelect.addEventListener('change', (e) => {
            currentSort = e.target.value;
            renderProducts();
        });
        
        resetBtn.addEventListener('click', () => {
            currentSort = 'default';
            sortSelect.value = 'default';
            renderProducts();
        });
        
        renderProducts();
    });
</script>
</body>
</html>
