<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AnimeStreet</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- CSS Files -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components/navbar.css">
    <link rel="stylesheet" href="css/components/footer.css">
    <link rel="stylesheet" href="css/responsive.css">

    <!-- ✅ EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

    <style>
        /* ✅ YOUR ORIGINAL STYLE (COMPLETELY UNCHANGED) */
        .auth-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--light);
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: var(--gray);
        }

        .auth-tab.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--gray);
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
        }

        .auth-message {
            margin-top: 20px;
            padding: 10px;
            text-align: center;
            display: none;
        }

        .auth-message.success {
            background: var(--success);
            color: white;
            display: block;
        }

        .auth-message.error {
            background: var(--danger);
            color: white;
            display: block;
        }

        /* ✅ ONLY ANIMATIONS ADDED (NO COLORS OR LAYOUT CHANGES) */
        .auth-tab {
            transition: transform 0.2s ease, color 0.2s ease;
        }

        .auth-tab:active {
            transform: scale(0.95);
        }

        .auth-btn {
            transition: transform 0.2s ease, opacity 0.2s ease;
            cursor: pointer;
        }

        .auth-btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .auth-btn.click-animation {
            animation: buttonPop 0.3s ease;
        }

        @keyframes buttonPop {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(0.95);
            }

            100% {
                transform: scale(1);
            }
        }

        .form-group input {
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(var(--primary-rgb), 0.2);
        }

        .auth-tab {
            position: relative;
            overflow: hidden;
        }

        .auth-tab:after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--primary);
            transform: scaleX(0);
            transition: transform 0.2s ease;
        }

        .auth-tab.active:after {
            transform: scaleX(1);
        }

        .auth-message {
            animation: messageSlide 0.3s ease;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Ripple effect for buttons */
        .auth-btn {
            position: relative;
            overflow: hidden;
        }

        .auth-btn:after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 5px;
            height: 5px;
            background: rgba(255, 255, 255, 0.5);
            opacity: 0;
            border-radius: 100%;
            transform: scale(1, 1) translate(-50%);
            transform-origin: 50% 50%;
        }

        .auth-btn:focus:not(:active):after {
            animation: ripple 1s ease-out;
        }

        @keyframes ripple {
            0% {
                transform: scale(0, 0);
                opacity: 0.5;
            }

            100% {
                transform: scale(20, 20);
                opacity: 0;
            }
        }

        /* Loading spinner animation */
        .auth-btn.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        .auth-btn.loading .btn-text {
            opacity: 0;
        }

        .auth-btn.loading:before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            margin: -10px 0 0 -10px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spinner 0.6s linear infinite;
        }

        @keyframes spinner {
            to {
                transform: rotate(360deg);
            }
        }

        /* Input success animation */
        .form-group input.valid-success {
            animation: inputPulse 0.3s ease;
        }

        @keyframes inputPulse {
            0% {
                border-color: var(--gray);
            }

            50% {
                border-color: var(--success);
                transform: scale(1.02);
            }

            100% {
                border-color: var(--gray);
            }
        }
    </style>
</head>

<body>

    <div id="navbar"></div>

    <main class="container">
        <div class="auth-container">

            <h2 style="text-align: center;">Welcome to AnimeStreet</h2>

            <!-- Tabs -->
            <div class="auth-tabs">
                <div class="auth-tab active" onclick="switchTab('login')">Login</div>
                <div class="auth-tab" onclick="switchTab('signup')">Sign Up</div>
            </div>

            <!-- LOGIN -->
            <div id="loginForm" class="auth-form active">
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" required>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" required>
                    </div>

                    <button type="submit" class="auth-btn" id="loginBtn">Login</button>
                </form>
            </div>

            <!-- SIGNUP -->
            <!-- SIGNUP -->
            <div id="signupForm" class="auth-form">
                <form onsubmit="handleSignup(event)">
                    <!-- STEP 1: Basic info -->
                    <div id="step1Fields">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="signupName" required>
                        </div>

                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="signupEmail" required>
                        </div>

                        <div class="form-group">
                            <button type="button" class="auth-btn" id="sendOtpBtn" onclick="sendOTP()">Send OTP</button>
                        </div>
                    </div>

                    <!-- STEP 2: Hidden initially, appears after OTP sent -->
                    <div id="step2Fields" style="display: none;">
                        <div class="form-group">
                            <label>Enter OTP</label>
                            <input type="text" id="signupOTP">
                        </div>

                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="signupPassword" required>
                        </div>

                        <div class="form-group">
                            <label>Confirm Password</label>
                            <input type="password" id="signupConfirmPassword" required>
                        </div>

                        <button type="submit" class="auth-btn" id="signupBtn">Sign Up</button>
                    </div>
                </form>
            </div>

            <div id="authMessage" class="auth-message"></div>

        </div>
    </main>

    <div id="footer"></div>

    <script src="js/services/storage.js"></script>
    <script src="js/services/auth.js"></script>
    <script src="js/load-components.js"></script>

    <script>

        // TAB SWITCH (with animation)
        function switchTab(tab) {
            // Add click animation to tabs
            const tabs = document.querySelectorAll('.auth-tab');
            tabs.forEach(t => {
                if (t.textContent.toLowerCase().includes(tab)) {
                    t.style.animation = 'buttonPop 0.3s ease';
                    setTimeout(() => {
                        t.style.animation = '';
                    }, 300);
                }
            });

            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));

            if (tab === 'login') {
                document.querySelector('.auth-tab').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.auth-tab')[1].classList.add('active');
                document.getElementById('signupForm').classList.add('active');
            }

            document.getElementById('authMessage').className = 'auth-message';
        }

        // LOGIN (with button animation)
        function handleLogin(event) {
            event.preventDefault();

            const btn = document.getElementById('loginBtn');

            // Add loading animation
            btn.classList.add('loading');

            // Add click animation
            btn.classList.add('click-animation');
            setTimeout(() => {
                btn.classList.remove('click-animation');
            }, 300);

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            // Simulate async operation
            setTimeout(() => {
                const result = AuthService.login(email, password);

                const messageDiv = document.getElementById('authMessage');

                if (result.success) {
                    // Get user data and save to localStorage
                    const user = AuthService.getUserByEmail(email);
                    localStorage.setItem('currentUser', JSON.stringify(user));

                    messageDiv.className = 'auth-message success';
                    messageDiv.textContent = 'Login successful! Redirecting...';

                    // Add success animation to inputs
                    document.getElementById('loginEmail').classList.add('valid-success');
                    document.getElementById('loginPassword').classList.add('valid-success');

                    setTimeout(() => {
                        document.getElementById('loginEmail').classList.remove('valid-success');
                        document.getElementById('loginPassword').classList.remove('valid-success');
                    }, 300);

                    // Redirect to profile page
                    setTimeout(() => {
                        window.location.href = 'profile.html';
                    }, 1000);
                }
                else {
                    messageDiv.className = 'auth-message error';
                    messageDiv.textContent = result.message;
                }

                // Remove loading animation
                btn.classList.remove('loading');
            }, 500);
        }

        // INIT EMAILJS
        (function () {
            emailjs.init("knXZM5b18Noa5e-b5");
        })();

        let generatedOTP = "";

        // GENERATE OTP
        function generateOTP() {
            return Math.floor(100000 + Math.random() * 900000);
        }

        // SEND OTP (with button animation)
        function sendOTP() {
            const btn = document.getElementById('sendOtpBtn');
            const email = document.getElementById('signupEmail').value;
            const msg = document.getElementById('authMessage');

            // Add click animation
            btn.classList.add('click-animation');
            setTimeout(() => {
                btn.classList.remove('click-animation');
            }, 300);

            if (!email) {
                msg.className = 'auth-message error';
                msg.textContent = 'Enter email first';

                // Shake animation for email input
                document.getElementById('signupEmail').style.animation = 'shake 0.3s ease';
                setTimeout(() => {
                    document.getElementById('signupEmail').style.animation = '';
                }, 300);
                return;
            }

            // Add loading animation
            btn.classList.add('loading');
            btn.textContent = '';

            generatedOTP = generateOTP();

            emailjs.send("service_pfe3kxo", "template_8q6zcef", {
                to_email: email,
                otp: generatedOTP
            }).then(() => {
                msg.className = 'auth-message success';
                msg.textContent = 'OTP sent!';

                // ✅ REVEAL STEP 2 FIELDS AFTER OTP SENT
                document.getElementById('step2Fields').style.display = 'block';

                // Smooth scroll to OTP field
                document.getElementById('signupOTP').scrollIntoView({ behavior: 'smooth', block: 'center' });

                // Pulse animation on OTP input
                document.getElementById('signupOTP').style.animation = 'inputPulse 0.3s ease';
                setTimeout(() => {
                    document.getElementById('signupOTP').style.animation = '';
                }, 300);
            }).catch(() => {
                msg.className = 'auth-message error';
                msg.textContent = 'Failed to send OTP';
            }).finally(() => {
                // Remove loading animation
                btn.classList.remove('loading');
                btn.textContent = 'Send OTP';
            });
        }

        // SIGNUP WITH OTP (with button animation)
        function handleSignup(event) {
            event.preventDefault();

            const btn = document.getElementById('signupBtn');

            // Add loading animation
            btn.classList.add('loading');

            // Add click animation
            btn.classList.add('click-animation');
            setTimeout(() => {
                btn.classList.remove('click-animation');
            }, 300);

            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('signupConfirmPassword').value;
            const otp = document.getElementById('signupOTP').value;

            const msg = document.getElementById('authMessage');

            // Simulate async operation
            setTimeout(() => {
                if (password !== confirmPassword) {
                    msg.className = 'auth-message error';
                    msg.textContent = 'Passwords do not match';

                    // Shake animation for password fields
                    document.getElementById('signupPassword').style.animation = 'shake 0.3s ease';
                    document.getElementById('signupConfirmPassword').style.animation = 'shake 0.3s ease';

                    setTimeout(() => {
                        document.getElementById('signupPassword').style.animation = '';
                        document.getElementById('signupConfirmPassword').style.animation = '';
                    }, 300);

                    btn.classList.remove('loading');
                    return;
                }

                if (otp != generatedOTP) {
                    msg.className = 'auth-message error';
                    msg.textContent = 'Invalid OTP';

                    // Shake animation for OTP input
                    document.getElementById('signupOTP').style.animation = 'shake 0.3s ease';
                    setTimeout(() => {
                        document.getElementById('signupOTP').style.animation = '';
                    }, 300);

                    btn.classList.remove('loading');
                    return;
                }

                const result = AuthService.register(name, email, password);

                if (result.success) {
                    // Get user data and save to localStorage
                    const user = AuthService.getUserByEmail(email);
                    localStorage.setItem('currentUser', JSON.stringify(user));

                    msg.className = 'auth-message success';
                    msg.textContent = 'Registration successful! Redirecting...';

                    // Add success animation to all inputs
                    document.querySelectorAll('#signupForm input').forEach(input => {
                        input.classList.add('valid-success');
                        setTimeout(() => {
                            input.classList.remove('valid-success');
                        }, 300);
                    });

                    // Redirect to profile page
                    setTimeout(() => {
                        window.location.href = 'profile.html';
                    }, 100);
                }
                else {
                    msg.className = 'auth-message error';
                    msg.textContent = result.message;
                }

                btn.classList.remove('loading');
            }, 500);
        }

        // Add shake animation keyframe
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
                20%, 40%, 60%, 80% { transform: translateX(5px); }
            }
        `;
        document.head.appendChild(style);

    </script>

</body>

</html>
