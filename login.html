<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AnimeShop</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS Files -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components/navbar.css">
    <link rel="stylesheet" href="css/components/footer.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
        }
        
        .auth-tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--light);
        }
        
        .auth-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: var(--gray);
            transition: all 0.3s ease;
        }
        
        .auth-tab.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }
        
        .auth-form {
            display: none;
        }
        
        .auth-form.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--dark);
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--gray);
            border-radius: var(--radius-sm);
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .auth-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        
        .auth-btn:hover {
            background: var(--primary-dark);
        }
        
        .auth-message {
            margin-top: 20px;
            padding: 10px;
            border-radius: var(--radius-sm);
            text-align: center;
            display: none;
        }
        
        .auth-message.success {
            background: var(--success);
            color: white;
            display: block;
        }
        
        .auth-message.error {
            background: var(--danger);
            color: white;
            display: block;
        }
        
        .auth-links {
            margin-top: 20px;
            text-align: center;
        }
        
        .auth-links a {
            color: var(--primary);
            text-decoration: none;
        }
        
        .auth-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- Navbar placeholder -->
    <div id="navbar"></div>

    <main class="container">
        <div class="auth-container">
            <h2 style="text-align: center; margin-bottom: 20px;">Welcome to AnimeShop</h2>
            
            <!-- Tabs -->
            <div class="auth-tabs">
                <div class="auth-tab active" onclick="switchTab('login')">Login</div>
                <div class="auth-tab" onclick="switchTab('signup')">Sign Up</div>
            </div>
            
            <!-- Login Form -->
            <div id="loginForm" class="auth-form active">
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" required>
                    </div>
                    <button type="submit" class="auth-btn">Login</button>
                </form>
                <div class="auth-links">
                    <a href="#" onclick="switchTab('signup')">Don't have an account? Sign up</a>
                </div>
            </div>
            
            <!-- Signup Form -->
            <div id="signupForm" class="auth-form">
                <form onsubmit="handleSignup(event)">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="signupName" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="signupEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Password (min 6 characters)</label>
                        <input type="password" id="signupPassword" minlength="6" required>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="signupConfirmPassword" required>
                    </div>
                    <button type="submit" class="auth-btn">Sign Up</button>
                </form>
                <div class="auth-links">
                    <a href="#" onclick="switchTab('login')">Already have an account? Login</a>
                </div>
            </div>
            
            <!-- Message -->
            <div id="authMessage" class="auth-message"></div>
        </div>
    </main>

    <!-- Footer placeholder -->
    <div id="footer"></div>

    <!-- JavaScript Files -->
    <script src="js/services/storage.js"></script>
    <script src="js/services/auth.js"></script>
    <script src="js/load-components.js"></script>
    <script>
        function switchTab(tab) {
            // Update tabs
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelector('.auth-tab').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.auth-tab')[1].classList.add('active');
                document.getElementById('signupForm').classList.add('active');
            }
            
            // Clear message
            document.getElementById('authMessage').className = 'auth-message';
        }
        
        function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            const result = AuthService.login(email, password);
            
            const messageDiv = document.getElementById('authMessage');
            if (result.success) {
                messageDiv.className = 'auth-message success';
                messageDiv.textContent = 'Login successful! Redirecting...';
                
                setTimeout(() => {
                    window.location.href = result.redirect;
                }, 1500);
            } else {
                messageDiv.className = 'auth-message error';
                messageDiv.textContent = result.message;
            }
        }
        
        function handleSignup(event) {
            event.preventDefault();
            
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('signupConfirmPassword').value;
            
            const messageDiv = document.getElementById('authMessage');
            
            if (password !== confirmPassword) {
                messageDiv.className = 'auth-message error';
                messageDiv.textContent = 'Passwords do not match';
                return;
            }
            
            const result = AuthService.register(name, email, password);
            
            if (result.success) {
                messageDiv.className = 'auth-message success';
                messageDiv.textContent = 'Registration successful! Redirecting...';
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } else {
                messageDiv.className = 'auth-message error';
                messageDiv.textContent = result.message;
            }
        }
    </script>
</body>
</html>
