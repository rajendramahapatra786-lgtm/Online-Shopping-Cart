<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopCart - Cart</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/cart.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <!-- Navbar will be loaded here by JavaScript -->

    <div class="page-header">
        <div class="container">
            <h1>Shopping Cart</h1>
            <p>Review and manage your items</p>
        </div>
    </div>

    <section class="cart-page">
        <div class="container">
            <div class="cart-layout">
                <div class="cart-items-container">
                    <div id="cart-items" class="cart-items"></div>
                </div>
                <aside class="cart-summary">
                    <h3>Order Summary</h3>
                    <div class="summary-row">
                        <span>Subtotal:</span>
                        <span>$<span id="cart-subtotal">0.00</span></span>
                    </div>
                    <div class="summary-row">
                        <span>Shipping:</span>
                        <span>$<span id="shipping-cost">5.99</span></span>
                    </div>
                    <div class="summary-row">
                        <span>Tax (10%):</span>
                        <span>$<span id="tax-amount">0.00</span></span>
                    </div>
                    <div class="summary-row total">
                        <span>Total:</span>
                        <span>$<span id="cart-total">0.00</span></span>
                    </div>
                    <button class="btn btn-primary btn-checkout" id="checkout-btn">Checkout</button>
                    <button class="btn btn-secondary" id="clear-cart-btn">Clear Cart</button>
                </aside>
            </div>
        </div>
    </section>

    <!-- Footer will be loaded here by JavaScript -->
    
    <script src="components/navbar.js"></script>
    <script src="components/footer.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
